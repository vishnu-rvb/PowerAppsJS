<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/material_orange.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/vishnu-rvb/PowerAppsJS/src/PowerApps.css">
</head>

<body class="ms-Fabric">
    <header></header>
    <form id="form"></form>

    <script type="module">
        import { PowerApps } from "https://cdn.jsdelivr.net/gh/vishnu-rvb/PowerAppsJS@v0/src/PowerApps.js";
        const PA = new PowerApps();
        PA.init().then(()=>{
            PA.add_control('header','header',{'title':'Test'});
            PA.add_control('#form','text',{'label':'Name','id':'name'});
            PA.add_control('#form','number',{'label':'Output','id':'output'});
        });
    </script>
</body>
</html>
