<template class="date">
    <div class="power-app-form-field" power-app-type="date">
        <span class="power-app-field-required">*</span>
        <div class="power-app-field-value">
            <div class="power-app-field-label">{{label}}</div>
            <div class="power-app-field-input">
                <input id="{{id}}" type="date" required>
                <span class="power-app-icon-suffix calendar">
                    <i class="ms-Icon ms-Icon--Calendar" aria-hidden="true"></i>
                </span>
            </div>
        </div>
    </div>
</template>
