<template class="number">
    <div class="power-app-form-field" power-app-type="number">
        <span class="power-app-field-required">*</span>
        <div class="power-app-field-value">
            <div class="power-app-field-label">{{label}}</div>
            <div class="power-app-field-input">
                <input type="number" id="{{id}}" required>
                <!--<span class="power-app-icon-suffix blank"></span>-->
            </div>
        </div>
    </div>
</template>
