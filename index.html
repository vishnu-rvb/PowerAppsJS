<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerApps JS Demo</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <!-- override default date control theme-->
    <link type="text/css" rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/dark.css" themeOverride>
    <!-- Example -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #4a4a4a;
            display: flex;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .form-container {
            padding: 10px;
            background: white;
            min-height: 100vh;
        }

        .footer-text {
            text-align:center;
            font-size: 12px;
            color: #999;
            background: white;
            margin-top: 0;
            margin-bottom: 0;
        }

        .footer-text, header, .form-container {
            width: 100%;
            max-width: 600px;
        }
    </style>

</head>

<body class="ms-Fabric">

    <!-- Header -->
    <header></header>

    <div class="form-container">
        <form id="myForm"></form>
    </div>

    <p class="footer-text">PowerApps JS (v0)</p>

    <script type="module">
        import { PowerApps } from "./src/core/PowerApps.js";

        document.addEventListener("DOMContentLoaded", async () => {
            const PA = new PowerApps();
            await PA.init();

            function submitForm() {
                alert("Submit clicked");
            }

            function resetForm() {
                location.reload();
            }

            await PA.add_control('header','header',{
                title:'PowerApps JS Example',
                on_clear: resetForm,
                on_submit: submitForm
            });

            /*await PA.add_control('#myForm','gallery',{
                label:'test',
                template:[
                    { type: 'text', data:{ label: 'date',readOnly:true } },
                    { type: 'text', data:{ label: 'shift',readOnly:true } },
                    { type: 'text', data:{ label: 'line',readOnly:true } },
                    { type: 'button', data:{ value: '>', width: '50px',x:1,y:0 } }
                ],
                items:[
                    { date: '21-4-26' , shift: 'A', line: 'Hem'},
                    { date: '22-4-26' , shift: 'B', line: 'GXL'},
                    { date: '23-4-26' , shift: 'C', line: 'WP'},
                ]
            });*/
            await PA.add_control('#myForm','date',{
                label:'Date',
                id:'date',
                name:'date'
            });

            await PA.add_control('#myForm','dropdown',{
                label:'Shift',
                id:'shift',
                name:'shift',
                options:['A','B','C'],
                multiselect:true
            });
            
            const lineField = await PA.add_control('#myForm','combobox',{
                label:'Line',
                id:'line',
                name:'line',
                options:['Milling','Drilling','Lathe','Robo welder'],
                multiselect:false
            });
            
            const partData = {
                Milling:['gear','blank'],
                Drilling:['bracket','Nut','cylinder'],
                Lathe:['bolt','shaft'],
                'Robo welder':['gasket','plate','chasis']
            };

            const partField = await PA.add_control('#myForm','combobox',{
                label:'Part',
                id:'part',
                name:'part'
            });
            
            lineField.on_change = (line)=>{
                const newOptions = partData[line] || [];
                partField.options = newOptions;
                partField.value='';
            };

            await PA.add_control('#myForm','number',{
                label:'Output',
                id:'output',
                name:'output',
                required:false,
                min:100,
                max:0
            });

            await PA.add_control('#myForm','text',{
                label:'Remarks',
                id:'remarks',
                name:'remarks',
                multiline:true
            });
            const myTable = await PA.add_control('#myForm', 'table', {
                label: 'Inventory List',
                id: 'inventory_list',
                searching: true,
                paging: true,
                responsive: true,
                columns: ['ID', 'Item', 'Stock'],
                rows: [
                        { ID: 1, Item: 'Milling Tool', Stock: 15,dummy:1 },
                        { ID: 2, Item: 'Lathe Bit', Stock: 8,dummy:1 },
                        { ID: 5, Item: 'Shaft', Stock: -5,dummy:1 }
                    ],
                on_select: (event,value)=>{ console.log('row clicked',value); }
            });

            await PA.add_control('#myForm', 'label',{
                value: 'label test'
            });

            await PA.add_control('#myForm', 'button',{
                value: 'call us',
                icon: 'ms-Icon--Phone',
                on_select: ()=>{ alert('ms-Icon--Phone ok'); }
            });
            await PA.add_control('#myForm', 'button',{
                value: 'maill us',
                icon: 'ms-Icon--Mail',
                on_select: ()=>{ alert('ms-Icon--Mail ok'); }
            });

            await PA.add_control('#myForm', 'image',{
                label: 'logo',
                id: 'logoID',
                edit: true,
                value: 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Phoenicopterus_ruber_in_S%C3%A3o_Paulo_Zoo.jpg',
                on_select: ()=>{ alert('logo pressed'); }
            });
        });
    </script>
</body>
</html>
